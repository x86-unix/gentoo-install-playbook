---
# Install GUI tools (binary packages)
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass

- name: "Extra: GUI tools"
  hosts: target
  gather_facts: false

  tasks:
    - name: Accept ~amd64 keyword for google-chrome and vscode
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/gui-tools
        mode: "0644"
        content: |
          www-client/google-chrome ~amd64
          app-editors/vscode ~amd64

    - name: Accept licenses for gui tools
      ansible.builtin.copy:
        dest: /etc/portage/package.license/gui-tools
        mode: "0644"
        content: |
          www-client/google-chrome google-chrome
          app-editors/vscode Microsoft-vscode

    - name: Install google-chrome and vscode
      ansible.builtin.command: emerge --noreplace www-client/google-chrome app-editors/vscode
      register: chrome_install
      changed_when: "'Installing' in chrome_install.stdout"
