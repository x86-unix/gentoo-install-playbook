---
# Install GUI tools via GURU overlay
# Usage: ansible-playbook -i inventory.ini extra/extra-gui-tools.yml --ask-pass

- name: "Extra: GUI tools"
  hosts: target
  gather_facts: false

  tasks:
    - name: Install eselect-repository and git
      ansible.builtin.command: emerge --noreplace app-eselect/eselect-repository dev-vcs/git
      register: eselect_install
      changed_when: "'Installing' in eselect_install.stdout"

    - name: Enable GURU overlay
      ansible.builtin.command: eselect repository enable guru
      args:
        creates: /var/db/repos/guru

    - name: Sync GURU overlay
      ansible.builtin.command: emaint sync -r guru
      changed_when: false

    - name: Accept licenses for gui tools
      ansible.builtin.copy:
        dest: /etc/portage/package.license/gui-tools
        mode: "0644"
        content: |
          www-client/google-chrome google-chrome
          app-editors/vscode Microsoft-vscode

    - name: Accept ~amd64 keyword for yazi
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/gui-tools
        mode: "0644"
        content: |
          app-misc/yazi ~amd64
          media-fonts/nerd-fonts ~amd64

    - name: Install google-chrome and vscode
      ansible.builtin.command: emerge --noreplace www-client/google-chrome app-editors/vscode x11-themes/papirus-icon-theme media-video/mpv media-gfx/imv app-misc/yazi media-fonts/nerd-fonts
      register: gui_install
      changed_when: "'Installing' in gui_install.stdout"

    - name: Ensure yazi config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/yazi
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure yazi opener (mpv/imv)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/yazi/yazi.toml
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          [opener]
          play = [
            { run = 'mpv "$@"', desc = 'mpv', orphan = true },
          ]
          view = [
            { run = 'imv "$@"', desc = 'imv', orphan = true },
          ]

          [open]
          rules = [
            { mime = "video/*", use = "play" },
            { mime = "audio/*", use = "play" },
            { mime = "image/*", use = "view" },
          ]

    - name: Set papirus as default icon theme
      ansible.builtin.file:
        path: /usr/share/icons/default
        state: directory
        mode: "0755"

    - name: Write default icon theme index
      ansible.builtin.copy:
        dest: /usr/share/icons/default/index.theme
        mode: "0644"
        content: |
          [Icon Theme]
          Inherits=Papirus


    - name: Override Chrome desktop for Wayland
      ansible.builtin.copy:
        dest: /usr/share/applications/google-chrome.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Google Chrome
          Exec=/usr/bin/google-chrome-stable --ozone-platform=wayland --password-store=basic %U
          Terminal=false
          Type=Application
          Icon=google-chrome
          Categories=Network;WebBrowser;

    - name: Override VSCode desktop for Wayland
      ansible.builtin.copy:
        dest: /usr/share/applications/code.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Visual Studio Code
          Exec=/opt/vscode/code --ozone-platform=wayland %F
          Terminal=false
          Type=Application
          Icon=vscode
          Categories=Development;

    - name: Create yazi desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/yazi.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Yazi
          Exec=foot --window-size-chars=144x30 yazi
          Terminal=false
          Type=Application
          Icon=system-file-manager
          Categories=System;FileManager;

    - name: Hide CLI/unnecessary apps from launcher
      ansible.builtin.copy:
        dest: /usr/share/applications/{{ item }}
        mode: "0644"
        content: |
          [Desktop Entry]
          NoDisplay=true
          Type=Application
          Name={{ item }}
      loop:
        - vim.desktop
        - foot-server.desktop
        - footclient.desktop
        - gcr-prompter.desktop
        - gcr-viewer.desktop
        - code-url-handler.desktop
        - fcitx5-wayland-launcher.desktop
        - assistant.desktop
        - com.google.Chrome.desktop
        - fcitx5-configtool.desktop
        - notification-daemon.desktop
        - org.fcitx.Fcitx5.desktop
        - org.fcitx.fcitx5-migrator.desktop
        - org.fcitx.fcitx5-qt6-gui-wrapper.desktop
        - qdbusviewer.desktop
        - waydroid.app.install.desktop
        - waydroid.market.desktop
        - blueman-adapters.desktop
        - blueman-manager.desktop
        - imv.desktop
        - imv-dir.desktop
        - mpv.desktop
