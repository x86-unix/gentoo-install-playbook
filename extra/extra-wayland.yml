---
# Install Wayland compositor stack (labwc + essentials)
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass

- name: "Extra: Wayland (labwc)"
  hosts: target
  gather_facts: false

  tasks:
    # google-chrome/vscode は gtk+[X] を必須で要求する。
    # waybar の依存で cairomm/gtkmm が先にビルドされるため、
    # ここで +X を設定しておかないと extra-gui-tools 実行時に
    # スロットコンフリクトが発生する。
    - name: Enable X USE flags for gtk dependencies (required by chrome/vscode)
      ansible.builtin.copy:
        dest: /etc/portage/package.use/gui-tools
        mode: "0644"
        content: |
          x11-libs/cairo X
          x11-libs/gtk+ X
          media-libs/libepoxy X
          media-libs/libglvnd X
          dev-cpp/cairomm X
          dev-cpp/gtkmm X
          app-text/xmlto text
          app-crypt/gcr gtk

    - name: Enable wayland USE flags
      ansible.builtin.copy:
        dest: /etc/portage/package.use/wayland
        mode: "0644"
        content: |
          */* wayland -X -gtk3 -qt5 -qt6
          gui-apps/waybar tray network pulseaudio
          >=media-libs/freetype-2.14.3 harfbuzz
          >=dev-libs/libdbusmenu-16.04.0-r4 gtk3
          >=media-plugins/alsa-plugins-1.2.12 pulseaudio
          sys-auth/seatd server

    - name: Accept ~amd64 keyword for labwc/greetd
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/wayland
        mode: "0644"
        content: |
          gui-wm/labwc ~amd64
          gui-libs/greetd ~amd64
          gui-apps/tuigreet ~amd64

    - name: Install labwc and essentials
      ansible.builtin.command: >
        emerge --noreplace
        gui-wm/labwc
        gui-apps/waybar
        gui-apps/foot
        gui-apps/wofi
        gui-apps/wl-clipboard
        gui-libs/greetd
        gui-apps/tuigreet
        x11-misc/xdg-user-dirs
        media-fonts/noto-cjk
        media-fonts/noto-emoji
      register: labwc_install
      changed_when: "'Installing' in labwc_install.stdout"

    - name: Rebuild seatd with server USE flag
      ansible.builtin.command: emerge --noreplace sys-auth/seatd
      register: seatd_rebuild
      changed_when: "'Installing' in seatd_rebuild.stdout"

    - name: Enable seat service (seatd)
      ansible.builtin.systemd:
        name: seatd
        enabled: true
        state: started

    - name: Add user to seat and video groups
      ansible.builtin.user:
        name: "{{ default_user }}"
        groups: seat,video,greetd
        append: true

    - name: Configure greetd
      ansible.builtin.copy:
        dest: /etc/greetd/config.toml
        mode: "0644"
        content: |
          [terminal]
          vt = 1

          [default_session]
          command = "tuigreet --cmd labwc --greeting 'Welcome' --remember --time --time-format '%Y-%m-%d %H:%M'"
          user = greetd

    - name: Enable greetd service
      ansible.builtin.systemd:
        name: greetd
        enabled: true
        state: started

    - name: Disable getty@tty1 (greetd takes over tty1)
      ansible.builtin.systemd:
        name: getty@tty1
        enabled: false
        masked: true

    - name: Ensure labwc config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/labwc
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Ensure foot config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/foot
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure foot font
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/foot/foot.ini
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          [font]
          font=Noto Sans Mono CJK JP:size=12

    - name: Ensure waybar config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/waybar
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure waybar (network module disabled to avoid segfault)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/waybar/config
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          {
            "layer": "top",
            "font": "Noto Sans CJK JP 12",
            "modules-left": ["custom/launcher", "clock"],
            "modules-center": [],
            "modules-right": ["pulseaudio", "memory", "cpu", "tray"],
            "custom/launcher": {
              "format": "🚀",
              "on-click": "wofi --show drun",
              "tooltip": false
            },
            "clock": { "format": "{:%Y-%m-%d %H:%M}" },
            "cpu": { "format": "CPU {usage}%" },
            "memory": { "format": "MEM {used:0.1f}G" },
            "pulseaudio": {
              "format": "🔊 {volume}%",
              "format-muted": "🔇",
              "on-click": "pactl set-sink-mute @DEFAULT_SINK@ toggle",
              "on-scroll-up": "pactl set-sink-volume @DEFAULT_SINK@ +5%",
              "on-scroll-down": "pactl set-sink-volume @DEFAULT_SINK@ -5%"
            },
            "tray": { "spacing": 8 }
          }

    - name: Configure labwc autostart
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/autostart
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          waybar &

    - name: Configure labwc environment (CapsLock to Ctrl)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/environment
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          XKB_DEFAULT_OPTIONS=ctrl:nocaps
