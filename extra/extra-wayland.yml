---
# Install Wayland compositor stack (labwc + essentials)
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass

- name: "Extra: Wayland (labwc)"
  hosts: target
  gather_facts: false

  roles:
    - role: overlay
      vars:
        overlay_name: guru

  tasks:
    # google-chrome/vscode は gtk+[X] を必須で要求する。
    # waybar の依存で cairomm/gtkmm が先にビルドされるため、
    # ここで +X を設定しておかないと extra-gui-tools 実行時に
    # スロットコンフリクトが発生する。
    - name: Enable X USE flags for gtk dependencies (required by chrome/vscode)
      ansible.builtin.copy:
        dest: /etc/portage/package.use/gui-tools
        mode: "0644"
        content: |
          x11-libs/cairo X
          x11-libs/gtk+ X
          media-libs/libepoxy X
          media-libs/libglvnd X
          dev-cpp/cairomm X
          dev-cpp/gtkmm X
          app-text/xmlto text
          app-crypt/gcr gtk

    - name: Enable wayland USE flags
      ansible.builtin.copy:
        dest: /etc/portage/package.use/wayland
        mode: "0644"
        content: |
          */* wayland -X -gtk3 -qt5 -qt6
          gui-apps/waybar tray network pulseaudio
          >=media-libs/freetype-2.14.3 harfbuzz
          >=dev-libs/libdbusmenu-16.04.0-r4 gtk3
          >=media-plugins/alsa-plugins-1.2.12 pulseaudio
          sys-auth/seatd server
          >=sys-apps/systemd-259.4-r1 policykit
          >=media-libs/mesa-25.3.6 X

    - name: Accept ~amd64 keyword for labwc/greetd
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/wayland
        mode: "0644"
        content: |
          gui-wm/labwc ~amd64
          gui-libs/greetd ~amd64
          gui-apps/tuigreet ~amd64
          gui-apps/wlopm ~amd64
          gui-apps/wlogout ~amd64
          x11-themes/apple-cursor ~amd64

    - name: Install labwc and essentials
      ansible.builtin.command: >
        emerge --noreplace
        gui-wm/labwc
        x11-base/xwayland
        gui-apps/waybar
        gui-apps/foot
        gui-apps/wofi
        gui-apps/wl-clipboard
        gui-apps/swaybg
        gui-apps/swayidle
        gui-apps/wlopm
        gui-apps/wlogout
        gui-libs/greetd
        gui-apps/tuigreet
        x11-misc/xdg-user-dirs
        media-fonts/noto-cjk
        media-fonts/noto-emoji
        media-fonts/jetbrains-mono
        x11-themes/apple-cursor
      register: labwc_install
      changed_when: "'Installing' in labwc_install.stdout"

    - name: Rebuild seatd with server USE flag
      ansible.builtin.command: emerge --noreplace sys-auth/seatd
      register: seatd_rebuild
      changed_when: "'Installing' in seatd_rebuild.stdout"

    - name: Enable seat service (seatd)
      ansible.builtin.systemd:
        name: seatd
        enabled: true
        state: started

    - name: Add user to seat and video groups
      ansible.builtin.user:
        name: "{{ default_user }}"
        groups: seat,video,greetd
        append: true

    - name: Configure greetd
      ansible.builtin.copy:
        dest: /etc/greetd/config.toml
        mode: "0644"
        content: |
          [terminal]
          vt = 1

          [default_session]
          command = "tuigreet --cmd labwc --greeting 'Welcome' --remember --time --time-format '%Y-%m-%d %H:%M'"
          user = greetd

          [initial_session]
          command = "labwc"
          user = "{{ default_user }}"

    - name: Enable greetd service
      ansible.builtin.systemd:
        name: greetd
        enabled: true
        state: started

    - name: Disable getty@tty1 (greetd takes over tty1)
      ansible.builtin.systemd:
        name: getty@tty1
        enabled: false
        masked: true

    - name: Ensure labwc config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/labwc
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Ensure foot config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/foot
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure foot font
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/foot/foot.ini
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          [main]
          font=JetBrains Mono:size=12,Noto Sans Mono CJK JP:size=12,JetBrainsMono Nerd Font:size=12

          [colors]
          alpha=0.8

          [tweak]
          font-monospace-warn=no

    - name: Ensure waybar config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/waybar
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure waybar (network module disabled to avoid segfault)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/waybar/config
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          {
            "layer": "top",
            "font": "Noto Sans CJK JP 12",
            "modules-left": ["ext/workspaces", "custom/launcher", "clock"],
            "modules-center": [],
            "modules-right": ["bluetooth", "pulseaudio", "memory", "cpu", "tray", "custom/power"],
            "ext/workspaces": {
              "format": "{name}",
              "sort-by-number": true,
              "on-click": "activate"
            },
            "custom/launcher": {
              "format": "🚀",
              "on-click": "wofi --show drun --allow-images --width=25%",
              "tooltip": false
            },
            "clock": { "format": "{:%Y-%m-%d %H:%M}" },
            "cpu": { "format": "CPU {usage}%" },
            "memory": { "format": "MEM {used:0.1f}G" },
            "pulseaudio": {
              "format": "🔊 {volume}%",
              "format-muted": "🔇",
              "on-click": "pactl set-sink-mute @DEFAULT_SINK@ toggle",
              "on-scroll-up": "pactl set-sink-volume @DEFAULT_SINK@ +5%",
              "on-scroll-down": "pactl set-sink-volume @DEFAULT_SINK@ -5%"
            },
            "bluetooth": {
              "format": "󰂯",
              "format-connected": "󰂱 {device_alias}",
              "format-disabled": "󰂲",
              "on-click": "blueman-manager",
              "tooltip-format": "{controller_alias} ({controller_address})",
              "tooltip-format-connected": "{controller_alias}\n{device_enumerate}",
              "tooltip-format-enumerate-connected": "{device_alias} ({device_address})"
            },
            "tray": { "spacing": 8 },
            "custom/power": {
              "format": "⏻",
              "on-click": "wlogout -m 460",
              "tooltip-format": "Power Menu"
            }
          }

    - name: Ensure wlogout config directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.config/wlogout
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Configure wlogout
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/wlogout/layout
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          {
            "label": "logout",
            "action": "loginctl terminate-user $USER",
            "text": "Logout",
            "keybind": "l"
          }
          {
            "label": "reboot",
            "action": "systemctl reboot",
            "text": "Reboot",
            "keybind": "r"
          }
          {
            "label": "shutdown",
            "action": "systemctl poweroff",
            "text": "Shutdown",
            "keybind": "s"
          }

    - name: Configure wlogout style
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/wlogout/style.css
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          * {
            background-image: none;
            box-shadow: none;
          }
          window {
            background-color: rgba(12, 12, 12, 0.9);
          }
          button {
            border-radius: 0;
            border-color: black;
            text-decoration-color: #FFFFFF;
            color: #FFFFFF;
            background-color: #1E1E1E;
            border-style: solid;
            border-width: 1px;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 15%;
            font-family: 'Noto Sans CJK JP';
            font-size: 16px;
          }
          button:focus, button:active, button:hover {
            background-color: #3700B3;
            outline-style: none;
          }
          #logout {
            background-image: image(url("/usr/share/wlogout/icons/logout.png"), url("/usr/local/share/wlogout/icons/logout.png"));
          }
          #reboot {
            background-image: image(url("/usr/share/wlogout/icons/reboot.png"), url("/usr/local/share/wlogout/icons/reboot.png"));
          }
          #shutdown {
            background-image: image(url("/usr/share/wlogout/icons/shutdown.png"), url("/usr/local/share/wlogout/icons/shutdown.png"));
          }

    - name: Configure waybar style
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/waybar/style.css
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          * {
            font-family: "Noto Sans CJK JP";
            font-size: 13px;
          }
          window#waybar {
            background: #1e1e2e;
            color: #cdd6f4;
          }
          #workspaces button,
          #ext-workspaces button {
            padding: 0 8px;
            color: #6c7086;
            border-radius: 4px;
          }
          #workspaces button.active,
          #ext-workspaces button.active {
            color: #cdd6f4;
            background: #45475a;
            font-weight: bold;
          }
          #clock, #cpu, #memory, #pulseaudio, #bluetooth, #tray, #custom-launcher {
            padding: 0 10px;
          }
          #custom-launcher {
            font-size: 16px;
          }
          #custom-reboot, #custom-poweroff {
            padding: 0 8px;
            font-size: 16px;
          }
          #custom-power {
            padding: 0 8px;
            font-size: 16px;
            color: #f38ba8;
          }

    - name: Configure labwc menu.xml
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/menu.xml
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          <openbox_menu>
          <menu id="root-menu">
            <item label="ターミナル">
              <action name="Execute"><command>foot</command></action>
            </item>
            <item label="ファイルマネージャ (yazi)">
              <action name="Execute"><command>foot --window-size-chars=144x30 yazi</command></action>
            </item>
            <item label="Chrome">
              <action name="Execute"><command>google-chrome-stable --ozone-platform=wayland --password-store=basic</command></action>
            </item>
            <separator />
            <item label="終了">
              <action name="Exit" />
            </item>
          </menu>
          </openbox_menu>

    - name: Deploy wallpaper
      ansible.builtin.copy:
        src: ../files/{{ wallpaper | default('frieren-blue-flower-anime-wallpaper-4k.png') }}
        dest: /home/{{ default_user }}/.config/labwc/wallpaper.png
        owner: "{{ default_user }}"
        mode: "0644"

    - name: Ensure ~/.icons/default directory
      ansible.builtin.file:
        path: /home/{{ default_user }}/.icons/default
        state: directory
        owner: "{{ default_user }}"
        mode: "0755"

    - name: Set default cursor theme via index.theme
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.icons/default/index.theme
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          [Icon Theme]
          Name=Default
          Comment=Default cursor theme
          Inherits=macOS

    - name: Configure labwc autostart
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/autostart
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          swaybg -i $HOME/.config/labwc/wallpaper.png -m fill &
          waybar &
          swayidle -w timeout {{ display_idle_timeout | default(3600) }} 'wlopm --off "*"' resume 'wlopm --on "*"' &
          fcitx5 -d &
          wayvnc &

    - name: Configure labwc environment (CapsLock to Ctrl)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/environment
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          XKB_DEFAULT_OPTIONS=ctrl:nocaps
          GTK_IM_MODULE=fcitx
          QT_IM_MODULE=fcitx
          XMODIFIERS=@im=fcitx
          QT_QPA_PLATFORM=wayland
          XCURSOR_THEME=macOS
          XCURSOR_SIZE=24

    - name: Configure labwc rc.xml (workspaces + keybinds)
      ansible.builtin.copy:
        dest: /home/{{ default_user }}/.config/labwc/rc.xml
        owner: "{{ default_user }}"
        mode: "0644"
        content: |
          <?xml version="1.0"?>
          <labwc_config>
            <desktops>
              <names>
                <name>1</name>
                <name>2</name>
                <name>3</name>
                <name>4</name>
              </names>
            </desktops>
            <keyboard>
              <keybind key="W-1"><action name="GoToDesktop" to="1"/></keybind>
              <keybind key="W-2"><action name="GoToDesktop" to="2"/></keybind>
              <keybind key="W-3"><action name="GoToDesktop" to="3"/></keybind>
              <keybind key="W-4"><action name="GoToDesktop" to="4"/></keybind>
              <keybind key="W-S-1"><action name="SendToDesktop" to="1"/></keybind>
              <keybind key="W-S-2"><action name="SendToDesktop" to="2"/></keybind>
              <keybind key="W-S-3"><action name="SendToDesktop" to="3"/></keybind>
              <keybind key="W-S-4"><action name="SendToDesktop" to="4"/></keybind>
              <keybind key="W-space"><action name="Execute"><command>wofi --show drun --allow-images --width=25%</command></action></keybind>
              <keybind key="W-Return"><action name="Execute"><command>foot</command></action></keybind>
              <keybind key="A-F4"><action name="Close"/></keybind>
            </keyboard>
          </labwc_config>
