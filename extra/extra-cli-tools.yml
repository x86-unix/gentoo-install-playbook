---
# Install CLI tools
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass

- name: "Extra: CLI tools"
  hosts: target
  gather_facts: false

  tasks:
    - name: Install bind-tools, netcat, sudo and bash-completion
      ansible.builtin.command: emerge --noreplace net-dns/bind-tools net-analyzer/netcat app-admin/sudo app-shells/bash-completion app-arch/7zip dev-util/github-cli app-text/tree
      register: tools_install
      changed_when: "'Installing' in tools_install.stdout"

    - name: Set default editor to vim
      ansible.builtin.command: eselect editor set vi
      changed_when: false

    - name: Enable stowe-verlay overlay
      ansible.builtin.include_role:
        name: overlay
      vars:
        overlay_name: stowe-verlay

    - name: Accept kiro-cli-bin keyword
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/kiro
        content: "dev-util/kiro-cli-bin **\n"
        mode: "0644"

    - name: Install kiro-cli-bin
      ansible.builtin.command: emerge --noreplace dev-util/kiro-cli-bin
      register: _kiro_install
      changed_when: "'Installing' in _kiro_install.stdout"
