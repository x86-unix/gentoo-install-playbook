---
# Install Waydroid (Android container on Wayland)
# Requires: GURU overlay (extra-gui-tools.yml), Wayland (extra-wayland.yml)
# Usage: ansible-playbook -i inventory.ini extra/extra-waydroid.yml --ask-pass

- name: "Extra: Waydroid"
  hosts: target
  gather_facts: false

  roles:
    - role: overlay
      vars:
        overlay_name: guru

  tasks:
    - name: Accept ~amd64 keyword for waydroid and deps
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/waydroid
        mode: "0644"
        content: |
          app-containers/waydroid ~amd64
          app-containers/lxc ~amd64
          dev-libs/gbinder ~amd64
          dev-python/gbinder ~amd64
          dev-python/pyclip ~amd64
          dev-libs/libglibutil ~amd64
          sys-libs/libcap ~amd64

    - name: Enable lxc USE flags
      ansible.builtin.copy:
        dest: /etc/portage/package.use/waydroid
        mode: "0644"
        content: |
          app-containers/lxc seccomp
          sys-libs/libcap static-libs

    - name: Install waydroid
      ansible.builtin.command: emerge --noreplace app-containers/waydroid
      register: waydroid_install
      changed_when: "'Installing' in waydroid_install.stdout"

    - name: Enable waydroid service
      ansible.builtin.systemd:
        name: waydroid-container
        enabled: true
        state: started

    - name: Ensure ext4 module loads at boot (required for system.img mount)
      ansible.builtin.copy:
        dest: /etc/modules-load.d/waydroid.conf
        mode: "0644"
        content: "ext4\n"

    - name: Add user to waydroid group
      ansible.builtin.user:
        name: "{{ default_user }}"
        groups: waydroid
        append: true
      when: "'waydroid' in lookup('pipe', 'getent group | cut -d: -f1')"

    - name: Check kernel binder support
      ansible.builtin.command: zgrep CONFIG_ANDROID_BINDER /proc/config.gz
      register: binder_check
      changed_when: false
      failed_when: false
      ignore_errors: true

    - name: Warn if binder not enabled in kernel
      ansible.builtin.debug:
        msg: >
          WARNING: CONFIG_ANDROID_BINDER_IPC may not be enabled in the running kernel.
          Rebuild kernel with CONFIG_ANDROID_BINDER_IPC=y and CONFIG_ANDROID_BINDERFS=y,
          then run: waydroid init
      when: binder_check.rc != 0 or 'CONFIG_ANDROID_BINDER_IPC=y' not in binder_check.stdout

    - name: Create waydroid launcher script
      ansible.builtin.copy:
        dest: /usr/local/bin/waydroid-launch
        mode: "0755"
        content: |
          #!/bin/sh
          waydroid session start &
          sleep 2
          waydroid show-full-ui

    - name: Create waydroid desktop entry
      ansible.builtin.copy:
        dest: /usr/share/applications/waydroid.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Waydroid
          Exec=waydroid-launch
          Terminal=false
          Type=Application
          Icon=waydroid
          Categories=System;Emulator;

    - name: Create waydroid window hint script
      ansible.builtin.copy:
        dest: /usr/local/bin/waydroid-window-hint
        mode: "0755"
        content: |
          #!/bin/sh
          HINT="waydroid prop set persist.waydroid.multi_windows true
          waydroid prop set persist.waydroid.width 1080
          waydroid prop set persist.waydroid.height 720"

          echo "$HINT"
          echo
          printf "実行しますか? (yes/No): "
          read ans
          if [ "$ans" = "yes" ]; then
            eval "$HINT"
            echo "設定しました"
            sleep 1
          fi

          sed -i -n '/Waydroid ウィンドウ化/,/<\/item>/!p' ~/.config/labwc/menu.xml
          sed -i 'N;s/<separator \/>[[:space:]]*\n[[:space:]]*<separator \/>/<separator \/>/;P;D' ~/.config/labwc/menu.xml
          killall -SIGHUP labwc
