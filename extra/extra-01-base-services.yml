---
# Install essential system services
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass

- name: "Extra: Base services (cronie, bind-tools, netcat, vim)"
  hosts: target
  gather_facts: false

  tasks:
    - name: Check if cronie is installed
      ansible.builtin.command: qlist -Iv sys-process/cronie
      register: cronie_check
      changed_when: false
      failed_when: false

    - name: Install cronie
      ansible.builtin.command: emerge --noreplace sys-process/cronie
      when: cronie_check.rc != 0

    - name: Enable cronie
      ansible.builtin.systemd:
        name: cronie
        enabled: true
        state: started

    - name: Install bind-tools, netcat, vim and sudo
      ansible.builtin.command: emerge --noreplace net-dns/bind-tools net-analyzer/netcat app-editors/vim app-admin/sudo
      register: tools_install
      changed_when: "'Installing' in tools_install.stdout"

    - name: Set default editor to vim
      ansible.builtin.command: eselect editor set vi
      changed_when: false

    - name: Configure sudo for wheel group
      ansible.builtin.copy:
        dest: /etc/sudoers.d/wheel
        mode: "0440"
        content: "{% if sudo_nopasswd %}%wheel ALL=(ALL:ALL) NOPASSWD: ALL{% else %}%wheel ALL=(ALL:ALL) ALL{% endif %}\n"

    - name: Check if user exists
      ansible.builtin.command: id {{ default_user }}
      register: user_check
      changed_when: false
      failed_when: false

    - name: Create user
      ansible.builtin.user:
        name: "{{ default_user }}"
        password: "{{ default_user_password | password_hash('sha512') }}"
        groups: wheel
        append: true
        shell: /bin/bash
        create_home: true
      when: user_check.rc != 0
