---
# Install fcitx5 + SKK (fcitx-skk from gentoo-zh overlay)
# Usage: ansible-playbook -i inventory.ini extra/extra-ime.yml --ask-pass

- name: "Extra: IME (fcitx5 + SKK)"
  hosts: target
  gather_facts: false

  tasks:
    - name: Install eselect-repository if not present
      ansible.builtin.command: emerge --noreplace app-eselect/eselect-repository dev-vcs/git
      register: eselect_install
      changed_when: "'Installing' in eselect_install.stdout"

    - name: Enable gentoo-zh overlay
      ansible.builtin.command: eselect repository enable gentoo-zh
      args:
        creates: /var/db/repos/gentoo-zh

    - name: Sync gentoo-zh overlay
      ansible.builtin.command: emaint sync -r gentoo-zh
      changed_when: false

    - name: Enable USE flags for fcitx5
      ansible.builtin.copy:
        dest: /etc/portage/package.use/ime
        mode: "0644"
        content: |
          app-i18n/fcitx-skk qt6
          app-i18n/fcitx-qt qt6
          app-i18n/fcitx:5 -enchant
          dev-qt/qtbase:6 opengl wayland -X
          dev-qt/qttools:6 opengl

    - name: Accept ~amd64 keywords for fcitx5
      ansible.builtin.copy:
        dest: /etc/portage/package.accept_keywords/ime
        mode: "0644"
        content: |
          app-i18n/fcitx:5 ~amd64
          app-i18n/fcitx-skk ~amd64
          app-i18n/fcitx-configtool ~amd64
          app-i18n/fcitx-gtk ~amd64
          app-i18n/fcitx-qt ~amd64
          app-i18n/libskk ~amd64
          app-i18n/skk-jisyo ~amd64

    - name: Install fcitx5 + SKK + configtool
      ansible.builtin.command: >
        emerge --update --deep --newuse
        app-i18n/fcitx:5
        app-i18n/fcitx-skk
        app-i18n/fcitx-configtool
        app-i18n/fcitx-gtk
        app-i18n/fcitx-qt
        app-i18n/skk-jisyo
      register: result
      changed_when: "'Installing' in result.stdout or 'Rebuilding' in result.stdout"

    - name: Configure fcitx5 environment
      ansible.builtin.copy:
        dest: /etc/environment.d/90-fcitx5.conf
        mode: "0644"
        content: |
          GTK_IM_MODULE=fcitx
          QT_IM_MODULE=fcitx
          XMODIFIERS=@im=fcitx
          SDL_IM_MODULE=fcitx
