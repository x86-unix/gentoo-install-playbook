---
# Extended setup - run AFTER base install and reboot
# Usage: ansible-playbook -i inventory.ini site-extra.yml --ask-pass
#
# Prerequisites: Base system booted from site-base.yml

- name: Import base services
  ansible.builtin.import_playbook: extra/extra-00-base-services.yml

- name: Import portage git sync
  ansible.builtin.import_playbook: extra/extra-01-portage-git-sync.yml

