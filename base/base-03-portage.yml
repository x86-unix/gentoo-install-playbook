---
- name: "Portage: Configure and sync"
  hosts: target
  gather_facts: false

  tasks:
    # --- Detect CPU optimization from gcc cc1 diff ---
    - name: Write flag detection script to chroot
      ansible.builtin.copy:
        dest: "{{ mountpoint }}/tmp/detect_flags.sh"
        mode: "0755"
        content: |
          #!/bin/sh
          CC="gcc"
          OPT="-march=native"
          NATIVE=$(echo | ${CC} -E -v ${OPT} - 2>&1 | grep cc1)
          NOARCH=$(echo | ${CC} -E -v - 2>&1 | grep cc1)
          FLAGS=""
          for native in ${NATIVE} ; do
            FOUND=0
            for noarch in ${NOARCH} ; do
              if [ "${native}" = "${noarch}" -a "${native}" != "${OPT}" ] ; then
                FOUND=1
                break
              fi
            done
            if [ ${FOUND} -eq 0 ] ; then
              FLAGS="${FLAGS}${native} "
            fi
          done
          echo "${FLAGS}"

    - name: Extract native-only GCC flags (cc1 diff method)
      ansible.builtin.command: "{{ chroot }} '/tmp/detect_flags.sh'"
      register: gcc_native_flags
      changed_when: false

    - name: Get number of CPUs
      ansible.builtin.shell: nproc
      register: nproc_result
      changed_when: false

    - name: Set optimization facts
      ansible.builtin.set_fact:
        cpu_native_flags: "{{ gcc_native_flags.stdout | trim }}"
        makeopts_jobs: "{{ nproc_result.stdout }}"

    # --- repos.conf (needed before emerge) ---
    - name: Ensure repos.conf directory
      ansible.builtin.file:
        path: "{{ mountpoint }}/etc/portage/repos.conf"
        state: directory
        mode: "0755"

    - name: Ensure portage config directories
      ansible.builtin.file:
        path: "{{ mountpoint }}/etc/portage/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - package.use
        - package.accept_keywords
        - package.license
        - package.mask
        - package.unmask
        - env

    - name: Copy gentoo.conf
      ansible.builtin.copy:
        src: "{{ mountpoint }}/usr/share/portage/config/repos.conf"
        dest: "{{ mountpoint }}/etc/portage/repos.conf/gentoo.conf"
        remote_src: true
        mode: "0644"
        force: false

    # --- Sync portage (needed before cpuid2cpuflags install) ---
    - name: Check if portage tree exists
      ansible.builtin.stat:
        path: "{{ mountpoint }}/var/db/repos/gentoo/metadata"
      register: portage_tree

    - name: Sync portage tree
      ansible.builtin.command: "{{ chroot }} 'emerge-webrsync'"
      when: not portage_tree.stat.exists

    # --- Install ccache ---
    - name: Install ccache
      ansible.builtin.command: "{{ chroot }} 'emerge --noreplace dev-util/ccache'"
      register: ccache_install
      changed_when: "'Installing' in ccache_install.stdout"

    - name: Configure ccache max_size
      ansible.builtin.command: "{{ chroot }} 'ccache --set-config=max_size=20G'"
      changed_when: false

    - name: Ensure ccache directory exists in chroot
      ansible.builtin.file:
        path: "{{ mountpoint }}{{ ccache_dir | default('/var/cache/ccache') }}"
        state: directory
        mode: "0775"
        owner: root
        group: portage

    # --- Install cpuid2cpuflags and detect ---
    - name: Install cpuid2cpuflags
      ansible.builtin.command: "{{ chroot }} 'emerge --noreplace app-portage/cpuid2cpuflags'"
      register: cpuid_install
      changed_when: "'Installing' in cpuid_install.stdout"

    - name: Get CPU_FLAGS_X86
      ansible.builtin.shell: >
        {{ chroot }} 'cpuid2cpuflags' | sed 's/: /="/' | sed 's/$/"/'
      register: cpuflags_final
      changed_when: false

    # --- Detect boot mode ---
    - name: Detect UEFI or BIOS
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: efi_check

    - name: Set GRUB platform
      ansible.builtin.set_fact:
        grub_platforms: "{{ 'efi-64' if efi_check.stat.exists else 'pc' }}"

    # --- Show all detected settings ---
    - name: Show detected settings
      ansible.builtin.debug:
        msg:
          - "native flags: {{ cpu_native_flags }}"
          - "MAKEOPTS: -j{{ makeopts_jobs }}"
          - "{{ cpuflags_final.stdout }}"

    # --- Write complete make.conf in one shot ---
    - name: Write make.conf
      ansible.builtin.copy:
        dest: "{{ mountpoint }}/etc/portage/make.conf"
        mode: "0644"
        content: |
          # Generated by ansible
          COMMON_FLAGS="{{ cpu_native_flags }} -O2 -pipe"
          CFLAGS="${COMMON_FLAGS}"
          CXXFLAGS="${COMMON_FLAGS}"
          FCFLAGS="${COMMON_FLAGS}"
          FFLAGS="${COMMON_FLAGS}"

          MAKEOPTS="-j{{ makeopts_jobs }}"

          FEATURES="ccache"
          CCACHE_DIR="{{ ccache_dir | default('/var/cache/ccache') }}"

          USE="{{ use_flags }}"

          ACCEPT_LICENSE="*"
          GRUB_PLATFORMS="{{ grub_platforms }}"

          LC_MESSAGES=C.UTF-8
          L10N="{{ default_l10n }}"
          {{ cpuflags_final.stdout }}

    - name: Show final make.conf
      ansible.builtin.command: cat {{ mountpoint }}/etc/portage/make.conf
      changed_when: false
      register: makeconf

    - name: Display make.conf
      ansible.builtin.debug:
        var: makeconf.stdout_lines
