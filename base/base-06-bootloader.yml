---
- name: "Bootloader: GRUB with ZFS support"
  hosts: target
  gather_facts: false

  pre_tasks:
    - name: Detect boot mode
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: efi_check

    - name: Set boot mode
      ansible.builtin.set_fact:
        boot_mode: "{{ 'uefi' if efi_check.stat.exists else 'bios' }}"

    - name: Detect target disk
      ansible.builtin.shell: >
        zpool status rpool | awk '/ONLINE/ && !/state|rpool/{print $1}' | head -1 | sed 's/p\?[0-9]*$//'
      register: zpool_disk
      changed_when: false

    - name: Detect rpool partition number
      ansible.builtin.shell: >
        zpool status rpool | awk '/ONLINE/ && !/state|rpool/{print $1}' | head -1 | grep -oP '[0-9]+$'
      register: rpool_partnum
      changed_when: false

    - name: Set disk device
      ansible.builtin.set_fact:
        disk_dev: "/dev/{{ zpool_disk.stdout }}"
        part_suffix: "{{ 'p' if 'nvme' in zpool_disk.stdout else '' }}"

    - name: Find kernel version
      ansible.builtin.shell: "{{ chroot }} 'readlink -f /usr/src/linux | xargs basename'"
      register: kernel_dir
      changed_when: false

    - name: Set kernel version
      ansible.builtin.set_fact:
        kernel_version: "{{ kernel_dir.stdout | regex_replace('^linux-', '') }}"

    - name: Find kernel image name
      ansible.builtin.shell: >
        find {{ mountpoint }}/boot/ -maxdepth 1
        \( -name 'vmlinuz*{{ kernel_version }}*' -o -name 'kernel-*{{ kernel_version }}*' \)
        -type f | head -1 | xargs basename
      register: kernel_image
      changed_when: false

    - name: Show config
      ansible.builtin.debug:
        msg: "Boot: {{ boot_mode }}, Disk: {{ disk_dev }}, Partition: gpt{{ rpool_partnum.stdout }}, Kernel: {{ kernel_image.stdout }}"

  tasks:
    # --- Install GRUB ---
    - name: Ensure package.use directory
      ansible.builtin.file:
        path: "{{ mountpoint }}/etc/portage/package.use"
        state: directory
        mode: "0755"

    - name: Enable libzfs for GRUB
      ansible.builtin.copy:
        dest: "{{ mountpoint }}/etc/portage/package.use/grub"
        content: "sys-boot/grub libzfs\n"
        mode: "0644"

    - name: Install GRUB and ZFS tools
      ansible.builtin.command: >
        {{ chroot }} 'emerge --newuse --noreplace sys-boot/grub sys-fs/zfs'
      register: grub_emerge
      changed_when: "'Installing' in grub_emerge.stdout"

    # --- Ensure ZFS cachefile ---
    - name: Generate zpool cachefile
      ansible.builtin.command: zpool set cachefile=/etc/zfs/zpool.cache rpool
      changed_when: false

    - name: Copy cachefile to chroot
      ansible.builtin.shell: |
        cmp -s /etc/zfs/zpool.cache {{ mountpoint }}/etc/zfs/zpool.cache && exit 0
        cp /etc/zfs/zpool.cache {{ mountpoint }}/etc/zfs/zpool.cache
      register: cachefile_copy
      changed_when: cachefile_copy.rc == 0 and 'cp' in (cachefile_copy.stdout | default(''))

    # --- Install GRUB to disk ---
    - name: Check if GRUB is installed (BIOS)
      ansible.builtin.shell: dd if={{ disk_dev }} bs=512 count=1 2>/dev/null | grep -c GRUB || true
      register: grub_bios_check
      changed_when: false
      when: boot_mode == 'bios'

    - name: Install GRUB (BIOS)
      ansible.builtin.command: >
        {{ chroot }} 'grub-install --target=i386-pc {{ disk_dev }}'
      when: boot_mode == 'bios' and grub_bios_check.stdout | int == 0

    - name: Check if GRUB is installed (UEFI)
      ansible.builtin.stat:
        path: "{{ mountpoint }}/boot/efi/EFI/Gentoo/grubx64.efi"
      register: grub_efi_check
      when: boot_mode == 'uefi'

    - name: Install GRUB (UEFI)
      ansible.builtin.command: >
        {{ chroot }} 'grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=Gentoo'
      when: boot_mode == 'uefi' and not grub_efi_check.stat.exists

    # --- Write grub.cfg (kernel is in rpool/ROOT/gentoo dataset) ---
    - name: Ensure grub directory
      ansible.builtin.file:
        path: "{{ mountpoint }}/boot/grub"
        state: directory
        mode: "0755"

    - name: Detect GRUB device number for rpool
      ansible.builtin.shell: >
        {{ chroot }} 'grub-probe --target=drive /dev/{{ zpool_disk.stdout }}{{ part_suffix }}{{ rpool_partnum.stdout }}'
      register: grub_drive
      changed_when: false

    - name: Set GRUB root device
      ansible.builtin.set_fact:
        grub_root: "{{ grub_drive.stdout }},gpt{{ rpool_partnum.stdout }}"

    - name: Write grub.cfg
      ansible.builtin.copy:
        dest: "{{ mountpoint }}/boot/grub/grub.cfg"
        mode: "0644"
        content: |
          set default=0
          set timeout=5

          insmod part_gpt
          insmod zfs
          {% if boot_mode == 'uefi' %}
          insmod fat
          insmod efi_gop
          insmod efi_uga
          {% endif %}

          menuentry "Gentoo - {{ kernel_version }}" {
              set root=({{ grub_root }})
              linux /ROOT/gentoo@/boot/{{ kernel_image.stdout }} root=zfs:rpool/ROOT/gentoo
              initrd /ROOT/gentoo@/boot/initramfs-{{ kernel_version }}.img
          }

    # --- Enable ZFS services ---
    - name: Enable ZFS services
      ansible.builtin.command: "{{ chroot }} 'systemctl enable {{ item }}'"
      loop:
        - zfs-import-cache.service
        - zfs-import.target
        - zfs-mount.service
        - zfs.target
      register: zfs_svc
      changed_when: "'Created symlink' in (zfs_svc.stdout + zfs_svc.stderr)"

    - name: Verify grub.cfg mentions rpool
      ansible.builtin.shell: grep -c 'rpool' {{ mountpoint }}/boot/grub/grub.cfg
      register: grub_check
      changed_when: false
      failed_when: grub_check.stdout | int == 0

    - name: Show success
      ansible.builtin.debug:
        msg: "GRUB installed with manual grub.cfg on {{ disk_dev }} ({{ boot_mode }})"
