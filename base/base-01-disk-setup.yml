---
# Play 1: Gather info and show to user
- name: "Phase 1: Detect boot mode and list disks"
  hosts: target
  gather_facts: false

  tasks:
    - name: Detect UEFI or BIOS
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: efi_check

    - name: Set boot mode
      ansible.builtin.set_fact:
        boot_mode: "{{ 'uefi' if efi_check.stat.exists else 'bios' }}"

    - name: Show boot mode
      ansible.builtin.debug:
        msg: "Detected boot mode: {{ boot_mode }}"

    - name: Gather disk list
      ansible.builtin.shell: lsblk -d -n -o NAME,SIZE,TYPE,MODEL | grep -E '^(sd|nvme|vd)'
      changed_when: false
      register: disk_list

    - name: Show available disks
      ansible.builtin.debug:
        msg: "{{ item }}"
      loop: "{{ disk_list.stdout_lines }}"

# Play 2: Partition and create ZFS
- name: "Phase 2: Partition disk and create ZFS pool"
  hosts: target
  gather_facts: false

  pre_tasks:
    - name: Detect boot mode
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: efi_check

    - name: Set facts
      ansible.builtin.set_fact:
        boot_mode: "{{ 'uefi' if efi_check.stat.exists else 'bios' }}"
        disk_dev: "/dev/{{ default_target_disk }}"
        part_suffix: "{{ 'p' if 'nvme' in default_target_disk else '' }}"

    - name: Verify disk exists
      ansible.builtin.stat:
        path: "{{ disk_dev }}"
      register: disk_check
      failed_when: not disk_check.stat.exists

    - name: Try to import rpool if not active
      ansible.builtin.shell: zpool import -f -R /mnt/gentoo rpool 2>/dev/null || true
      changed_when: false

    - name: Check if rpool already exists
      ansible.builtin.command: zpool list rpool
      register: rpool_check
      failed_when: false
      changed_when: false

    - name: Show existing pool status
      ansible.builtin.debug:
        msg: "rpool exists on {{ disk_dev }}."
      when: rpool_check.rc == 0

    - name: Confirm destruction of existing pool
      ansible.builtin.pause:
        prompt: "\n\e[1;31mrpool already exists on {{ disk_dev }}. DESTROY and recreate?\e[0m Type \e[1;32myes\e[0m to proceed"
      register: destroy_prompt
      when: rpool_check.rc == 0

    - name: Set destroy flag from prompt
      ansible.builtin.set_fact:
        default_confirm_destroy: "{{ destroy_prompt.user_input }}"
      when: rpool_check.rc == 0

    - name: Force destroy for fresh disk
      ansible.builtin.set_fact:
        default_confirm_destroy: "yes"
      when: rpool_check.rc != 0

    - name: Set need_create flag
      ansible.builtin.set_fact:
        need_create: "{{ (rpool_check.rc != 0) or (default_confirm_destroy == 'yes' and rpool_check.rc == 0) }}"

    - name: Destroy existing pool
      ansible.builtin.shell: |
        umount {{ mountpoint }}/dev/shm 2>/dev/null || true
        umount {{ mountpoint }}/dev/pts 2>/dev/null || true
        umount -R {{ mountpoint }}/dev 2>/dev/null || true
        umount -R {{ mountpoint }}/sys 2>/dev/null || true
        umount -R {{ mountpoint }}/run 2>/dev/null || true
        umount {{ mountpoint }}/proc 2>/dev/null || true
        umount {{ mountpoint }}/boot/efi 2>/dev/null || true
        zfs unmount -a 2>/dev/null || true
        zpool destroy -f rpool
      when: need_create and rpool_check.rc == 0

    - name: Check if rpool/ROOT/gentoo is mounted
      ansible.builtin.shell: zfs get -H -o value mounted rpool/ROOT/gentoo 2>/dev/null || echo "no"
      register: gentoo_mounted
      changed_when: false

  tasks:


    # --- Partitioning ---
    # BIOS: sda1(2M BIOS boot) sda2(swap) sda3(rpool)
    # UEFI: sda1(512M ESP)     sda2(swap) sda3(rpool)
    - name: Wipe partition table
      ansible.builtin.command: sgdisk --zap-all {{ disk_dev }}
      when: need_create

    - name: Create BIOS boot partition (2M)
      ansible.builtin.command: sgdisk -n 1:0:+2M -t 1:EF02 {{ disk_dev }}
      when: need_create and boot_mode == 'bios'

    - name: Create ESP partition (512M)
      ansible.builtin.command: sgdisk -n 1:0:+512M -t 1:EF00 {{ disk_dev }}
      when: need_create and boot_mode == 'uefi'

    - name: Get total memory in GB
      ansible.builtin.shell: awk '/MemTotal/{printf "%d", $2/1024/1024 + 1}' /proc/meminfo
      register: mem_gb
      changed_when: false

    - name: Set swap size
      ansible.builtin.set_fact:
        swap_size: "{{ [mem_gb.stdout | int, 8] | min }}G"

    - name: Create swap partition
      ansible.builtin.command: sgdisk -n 2:0:+{{ swap_size }} -t 2:8200 {{ disk_dev }}
      when: need_create

    - name: Create ZFS partition (remaining space)
      ansible.builtin.command: sgdisk -n 3:0:0 -t 3:BF00 {{ disk_dev }}
      when: need_create

    - name: Inform kernel of partition changes
      ansible.builtin.command: partprobe {{ disk_dev }}
      when: need_create

    - name: Wait for partitions
      ansible.builtin.pause:
        seconds: 2
      when: need_create

    - name: Format ESP
      ansible.builtin.command: mkfs.vfat -F 32 {{ disk_dev }}{{ part_suffix }}1
      when: need_create and boot_mode == 'uefi'

    - name: Format swap
      ansible.builtin.command: mkswap {{ disk_dev }}{{ part_suffix }}2
      when: need_create

    - name: Enable swap
      ansible.builtin.command: swapon {{ disk_dev }}{{ part_suffix }}2
      when: need_create

    # --- ZFS Pool ---
    - name: Create ZFS pool (rpool)
      ansible.builtin.command: >
        zpool create -f
        -o ashift=12
        -o autotrim=on
        -o compatibility=grub2
        -o cachefile=
        -O acltype=posixacl
        -O compression=lz4
        -O dnodesize=legacy
        -O normalization=formD
        -O relatime=on
        -O xattr=sa
        -O canmount=off
        -O mountpoint=none
        -R /mnt/gentoo
        rpool {{ disk_dev }}{{ part_suffix }}3
      when: need_create

    # --- ZFS Datasets (skip if already exist) ---
    - name: Check existing datasets
      ansible.builtin.shell: zfs list -H -o name 2>/dev/null
      register: existing_datasets
      changed_when: false

    - name: Create ROOT container
      ansible.builtin.command: zfs create -o canmount=off -o mountpoint=none rpool/ROOT
      when: "'rpool/ROOT' not in existing_datasets.stdout_lines"

    - name: Create gentoo root dataset
      ansible.builtin.command: zfs create -o canmount=noauto -o mountpoint=/ rpool/ROOT/gentoo
      when: "'rpool/ROOT/gentoo' not in existing_datasets.stdout_lines"

    - name: Create home dataset
      ansible.builtin.command: zfs create -o mountpoint=/home rpool/home
      when: "'rpool/home' not in existing_datasets.stdout_lines"

    # --- Mount at /mnt/gentoo (skip if already mounted) ---
    - name: Mount root dataset
      ansible.builtin.command: zfs mount rpool/ROOT/gentoo
      register: mount_result
      changed_when: false
      failed_when: mount_result.rc != 0 and 'already mounted' not in (mount_result.stderr | default('')) and 'filesystem already mounted' not in (mount_result.stderr | default(''))

    - name: Create /mnt/gentoo/boot/efi directory
      ansible.builtin.file:
        path: /mnt/gentoo/boot/efi
        state: directory
      when: boot_mode == 'uefi'

    - name: Check if ESP is mounted
      ansible.builtin.shell: findmnt /mnt/gentoo/boot/efi > /dev/null 2>&1 && echo "yes" || echo "no"
      register: esp_mounted
      changed_when: false
      when: boot_mode == 'uefi'

    - name: Mount ESP at /mnt/gentoo/boot/efi
      ansible.builtin.command: mount {{ disk_dev }}{{ part_suffix }}1 /mnt/gentoo/boot/efi
      when: boot_mode == 'uefi' and esp_mounted.stdout.strip() == 'no'

    # --- Verify ---
    - name: Show final layout
      ansible.builtin.shell: |
        echo "=== Boot mode: {{ boot_mode }} ==="
        echo ""
        echo "=== ZFS datasets ==="
        zfs list -o name,mountpoint,canmount
        echo ""
        echo "=== Mounts ==="
        findmnt -R /mnt/gentoo 2>/dev/null || mount | grep gentoo
      changed_when: false
      register: layout

    - name: Display result
      ansible.builtin.debug:
        var: layout.stdout_lines

    # --- second disk (optional) ---
    - name: Setup second disk
      when: second_disk | default('') != ''
      block:
        - name: Check if second disk exists
          ansible.builtin.stat:
            path: "/dev/{{ second_disk }}"
          register: second_disk_check
          failed_when: not second_disk_check.stat.exists

        - name: Check if second disk is already formatted
          ansible.builtin.command: blkid /dev/{{ second_disk }}
          register: second_disk_blkid
          changed_when: false
          failed_when: false

        - name: Format second disk as ext4
          ansible.builtin.command: mkfs.ext4 -F -L {{ second_disk }} /dev/{{ second_disk }}
          when: second_disk_blkid.rc != 0

        - name: Create mount point
          ansible.builtin.file:
            path: "{{ mountpoint }}/mnt/{{ second_disk }}"
            state: directory
            mode: "0755"

        - name: Mount second disk
          ansible.builtin.command: mount /dev/{{ second_disk }} {{ mountpoint }}/mnt/{{ second_disk }}
          register: second_disk_mount
          failed_when: second_disk_mount.rc != 0 and 'already mounted' not in (second_disk_mount.stderr | default(''))
          changed_when: second_disk_mount.rc == 0

        - name: Ensure ccache directory on second disk
          ansible.builtin.file:
            path: "{{ mountpoint }}{{ ccache_dir }}"
            state: directory
            mode: "0775"
          when: ccache_dir | default('') != ''
