---
# Paths
mountpoint: /mnt/gentoo
chroot: "chroot {{ mountpoint }} /bin/bash -c"

# Stage3
init_system: systemd

# Disk
default_target_disk: nvme0n1  # インストール先ディスク（例: sda, nvme0n1）
second_disk: ""  # 2台目物理ディスク名。設定すると ZFS pool を作成し /mnt/sdb にマウントする。不要な場合は空にする
ccache_dir: ""  # ccache ディレクトリ。空の場合は /var/cache/ccache を使用

# System
default_timezone: Asia/Tokyo
default_hostname: zfs-gentoo-note

# Portage
gentoo_mirror: https://distfiles.gentoo.org
use_flags: "zfs wayland -X -gtk -qt5 -qt6"

# Locale
default_locales:
  - en_US.UTF-8 UTF-8
  - ja_JP.UTF-8 UTF-8
default_lang: ja_JP.UTF-8
default_l10n: "en ja"

# Root password (change before running)
default_root_password: root

# User
default_user: gentoo
default_user_password: gentoo
sudo_nopasswd: true
