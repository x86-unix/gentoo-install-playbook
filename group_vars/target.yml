---
# Paths
mountpoint: /mnt/gentoo
chroot: "chroot {{ mountpoint }} /bin/bash -c"

# Stage3
init_system: systemd

# Disk (host-specific values are in host_vars/)
default_target_disk: sda
second_disk: ""
ccache_dir: ""

# System
default_timezone: Asia/Tokyo
default_hostname: zfs-gentoo

# Portage
gentoo_mirror: https://distfiles.gentoo.org
use_flags: "zfs wayland -X -gtk -qt5 -qt6"

# Locale
default_locales:
  - en_US.UTF-8 UTF-8
  - ja_JP.UTF-8 UTF-8
default_lang: ja_JP.UTF-8
default_l10n: "en ja"

# Root password (change before running)
default_root_password: root

# User
default_user: gentoo
default_user_password: gentoo
sudo_nopasswd: true

# Display
display_idle_timeout: 3600  # seconds until display off (default: 1 hour)

